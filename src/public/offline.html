<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CREOVA - Offline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 400px;
    }

    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 12px;
      font-weight: 600;
    }

    p {
      font-size: 16px;
      line-height: 1.6;
      opacity: 0.9;
      margin-bottom: 24px;
    }

    .retry-button {
      background: white;
      color: #16a34a;
      border: none;
      padding: 12px 32px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .retry-button:active {
      transform: scale(0.98);
    }

    .features {
      margin-top: 32px;
      text-align: left;
      background: rgba(255, 255, 255, 0.1);
      padding: 20px;
      border-radius: 12px;
    }

    .features h2 {
      font-size: 18px;
      margin-bottom: 12px;
    }

    .features ul {
      list-style: none;
      font-size: 14px;
      line-height: 2;
    }

    .features ul li:before {
      content: "✓ ";
      margin-right: 8px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>CREOVA requires an internet connection. Please check your network and try again.</p>
    <button class="retry-button" onclick="window.location.reload()">Retry Connection</button>
    
    <div class="features">
      <h2>When you're back online:</h2>
      <ul>
        <li>AI Crop Advisory</li>
        <li>Real-time Market Prices</li>
        <li>Weather Alerts</li>
        <li>Farming Tips & Resources</li>
        <li>Community Marketplace</li>
      </ul>
    </div>
  </div>
</body>
</html>
